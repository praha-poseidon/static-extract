name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Test Java runtime
        run: mvn -B test

      - name: Test TS runtime
        run: npm test
        working-directory: static-extract-runtime-ts

      - name: Package release distribution
        run: scripts/package-release.sh "${GITHUB_REF_NAME#v}"

      - uses: actions/upload-artifact@v4
        with:
          name: static-extract
          path: dist/*.zip

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
