name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build Java runtime CLI
        run: mvn -B -pl static-extract-runtime-java-cli -am package

      - name: Package Java runtime CLI distribution
        run: |
          mkdir -p target/release/static-extract-java
          cp -R static-extract-runtime-java-cli/target/appassembler/bin target/release/static-extract-java/
          cp -R static-extract-runtime-java-cli/target/appassembler/repo target/release/static-extract-java/
          cp README.md LICENSE target/release/static-extract-java/
          chmod +x target/release/static-extract-java/bin/static-extract-java
          cd target/release
          zip -r static-extract-java.zip static-extract-java

      - uses: actions/upload-artifact@v4
        with:
          name: static-extract-java
          path: target/release/static-extract-java.zip

      - uses: softprops/action-gh-release@v2
        with:
          files: target/release/static-extract-java.zip
